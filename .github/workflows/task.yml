name: 博主视频增量监控（飞书文档配置+3小时轮询）
on:
  schedule:
    # Cron表达式：每3小时执行一次（国际标准时间，对应北京时间）
    - cron: '0 */3 * * *'
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  monitor-and-summary:
    runs-on: ubuntu-latest
    env:
      # 强制使用Node.js 24，解决Node.js 20弃用报错，提前适配官方要求
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 步骤1：拉取GitHub仓库代码（适配Node.js 24，使用最新兼容版本）
      - name: 拉取仓库代码
        uses: actions/checkout@v4  # 官方最新兼容版本，支持Node.js 24

      # 步骤2：配置Python环境（兼容x64架构，彻底解决版本找不到问题）
      - name: 配置Python 3.10（适配x64架构，稳定可用）
        uses: actions/setup-python@v5  # 官方最新兼容版本，支持Node.js 24
        with:
          python-version: '3.10'  # 明确指定3.10版本，GitHub Actions官方支持
          architecture: 'x64'     # 强制匹配x64架构，避免版本缺失报错
          check-latest: true      # 自动校验最新补丁版本，确保可正常获取
          token: ${{ secrets.GITHUB_TOKEN }}  # 授权获取官方Python版本列表

      # 步骤3：安装依赖（明确升级pip，避免依赖安装失败）
      - name: 安装运行依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      # 步骤4：执行核心脚本（明确使用配置好的Python环境，避免环境冲突）
      - name: 执行自动化脚本
        env:
          # 从GitHub Secrets注入密钥（部署时配置）
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CREATORS_DOC_ID: ${{ secrets.FEISHU_CREATORS_DOC_ID }}
          FEISHU_SUMMARY_DOC_ID: ${{ secrets.FEISHU_SUMMARY_DOC_ID }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python main.py

      # 步骤5：提交历史记录更新（保存已处理视频ID，防重复）
      - name: 提交去重记录
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@example.com"
          git add history.json
          # 若无更新，提交会失败，用echo忽略失败
          git commit -m "auto update video history: $(date +'%Y-%m-%d %H:%M')" || echo "无新视频，无需提交历史记录"
          git push
