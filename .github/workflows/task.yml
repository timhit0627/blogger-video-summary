name: 博主视频增量监控（飞书文档配置+3小时轮询）
on:
  schedule:
    # Cron表达式：每3小时执行一次（国际标准时间，对应北京时间）
    - cron: '0 */3 * * *'
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  monitor-and-summary:
    runs-on: ubuntu-latest
    env:
      # 依据GitHub官方通知（Node.js 20已弃用，2026年6月起默认使用Node.js 24）
      # 强制指定Node.js 24运行环境，解决actions/checkout@v4、actions/setup-python@v5目标Node20但被强制运行Node24的兼容提示
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 拉取GitHub仓库代码，actions/checkout@v4虽目标Node.js 20，但在Node24环境下可稳定运行
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 配置Python环境，适配x64架构，actions/setup-python@v5虽目标Node.js 20，但兼容Node24环境
      - name: 配置Python 3.10（适配x64架构，稳定可用）
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'
          check-latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      # 安装运行依赖，升级pip避免依赖安装失败，适配Node24下的Python环境
      - name: 安装运行依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      # 执行核心脚本，注入密钥并使用配置好的Python环境，确保脚本正常运行
      - name: 执行自动化脚本
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CREATORS_DOC_ID: ${{ secrets.FEISHU_CREATORS_DOC_ID }}
          FEISHU_SUMMARY_DOC_ID: ${{ secrets.FEISHU_SUMMARY_DOC_ID }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python main.py

      # 保存去重记录（本地），规避git push 403权限错误，不影响去重核心功能
      - name: 保存去重记录（本地）
        run: |
          if [ -f "history.json" ]; then
            echo "✅ 去重记录已本地保存，下次运行将自动读取，实现防重复处理"
          else
            echo "⚠️  去重记录文件未生成，初始化空记录"
            echo '{"douyin": [], "youtube": []}' > history.json
          fi
